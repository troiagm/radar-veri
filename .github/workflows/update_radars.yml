name: Radar verisini guncelle

on:
  schedule:
    - cron: "17 1 * * *"   # her gece 01:17 UTC (TR 04:17)
  workflow_dispatch: {}      # elle tetikleme (Run workflow dugmesi)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Radar verisini cek
        run: python tools/fetch_radars.py TR docs/radars_tr.json

      - name: Degisiklik varsa yayinla
        run: |
          git config user.name "radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/radars_tr.json
          git diff --cached --quiet || git commit -m "Radar verisi guncellendi ($(date -u +%F))"
          git push
